name: auto-merge
on:
  pull_request_target:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/**'
jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ahmadnassri/action-dependabot-auto-merge@v2
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          update_type: all
